<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin - OSSKANSA Report System</title>
<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4f46e5,#2563eb);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.login-box button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login Admin</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script src="js/login.js"></script>

</body>
</html>
