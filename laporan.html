<!DOCTYPE html>
<html lang="id">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta charset="UTF-8">
<title>Kirim Laporan</title>

<link rel="stylesheet" href="css/style.css">

</head>
<script>

document.querySelectorAll("a").forEach(link => {

link.addEventListener("click", function(e){

const href = this.getAttribute("href")

if(href && !href.startsWith("#")){

e.preventDefault()

document.body.classList.add("fade-out")

setTimeout(() => {
window.location.href = href
},300)

}

})

})

</script>
<body>

<div class="navbar">

<h1>SIPENA</h1>

<div class="nav-links">

<a href="index.html">Beranda</a>
<a href="tentang.html">Tentang</a>
<a href="admin.html">Kontrol Admin</a>

</div>

</div>


<section class="form-section">

<h2>Kirim Pengaduan</h2>

<form id="laporanForm">


<div class="form-group">

<label>Nama Lengkap</label>
<input type="text" id="nama">

</div>


<div class="form-group">

<label>Kelas dan Jurusan </label>
<input type="text" id="kelas" required>

</div>


<div class="form-group">

<label>Kategori</label>

<select id="kategori">

<option>Fasilitas</option>
<option>Keamanan</option>
<option>Kebersihan</option>
<option>Lainnya</option>

</select>

</div>


<div class="form-group">

<label>Isi Laporan</label>

<textarea id="isi" rows="4" required></textarea>

</div>


<button class="btn">Kirim Laporan</button>

</form>

</section>


<script src="js/laporan.js"></script>

</body>

</html>
